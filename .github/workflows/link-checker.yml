name: Link Checker

on:
  schedule:
    - cron: '0 0 * * 0' # Ejecutar todos los domingos a las 00:00 UTC
  workflow_dispatch: # Permitir ejecución manual

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker (Lychee)
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --timeout 15 --max-retries 3 --accept 200..299,301,302,308 "README.md"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Create Issue if links are broken
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Enlaces rotos detectados en el README"
          content-filepath: ./lychee/out.md
          labels: |
            bug
            automated-report
          token: ${{ secrets.GITHUB_TOKEN }}
